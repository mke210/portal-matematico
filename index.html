<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Portal de Matemáticas</title>
<style>
  :root{
    --bg:#f6f8fb; --panel:#ffffff; --ink:#0b1727; --ink2:#3b475a; --muted:#7c8aa1;
    --line:#e3e8f0; --soft:#eef2f8;
    --accent:#1f6feb; --accent-d:#1453b8; --accent-l:#3b82f6;
    --green:#16a34a; --green-d:#15803d;
    --red:#dc2626; --red-d:#991b1b;
    --orange:#ea580c; --orange-d:#c2410c;
    --purple:#7c3aed;
    --radius:12px; --radius-sm:8px;
    --shadow:0 1px 3px rgba(15,23,42,.06), 0 4px 14px rgba(15,23,42,.06);
    --shadow-lg:0 4px 12px rgba(15,23,42,.08), 0 12px 32px rgba(15,23,42,.10);
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{
    background:var(--bg); color:var(--ink);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Arial,sans-serif;
    font-size:15px; line-height:1.5;
    min-height:100vh;
  }
  a{color:var(--accent); text-decoration:none}
  a:hover{text-decoration:underline}
  code{font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-size:.86em}

  /* ── Top bar ───────────────────────────── */
  .topbar{
    background:linear-gradient(135deg,#0f2748,#1e3c72 55%,#2a5298);
    color:#fff; padding:.9rem 1.2rem;
    display:flex; align-items:center; gap:.9rem; flex-wrap:wrap;
    box-shadow:0 2px 12px rgba(15,40,80,.18);
  }
  .topbar .brand{display:flex;align-items:center;gap:.6rem;flex:1;min-width:0}
  .topbar .brand .logo{
    width:38px;height:38px;border-radius:10px;
    background:rgba(255,255,255,.14); display:grid;place-items:center;
    font-size:1.25rem;
  }
  .topbar .brand h1{margin:0;font-size:1.05rem;font-weight:700;letter-spacing:-.01em}
  .topbar .brand p{margin:0;font-size:.74rem;opacity:.78;font-weight:500}
  .topbar .right{display:flex;align-items:center;gap:.5rem;flex-wrap:wrap}
  .conn{
    display:inline-flex;align-items:center;gap:.4rem;
    background:rgba(255,255,255,.12); padding:.3rem .7rem; border-radius:100px;
    font-size:.72rem; font-weight:600;
  }
  .conn-dot{width:8px;height:8px;border-radius:50%;background:#94a3b8;display:inline-block}
  .conn.online .conn-dot{background:#22c55e;box-shadow:0 0 0 3px rgba(34,197,94,.25)}
  .conn.offline .conn-dot{background:#f59e0b}

  /* ── Main layout ───────────────────────── */
  main{max-width:1180px;margin:0 auto;padding:1.2rem}
  @media (max-width:560px){ main{padding:.9rem} }

  /* ── Tabs ─────────────────────────────── */
  .tabs{
    display:flex; gap:.4rem; overflow-x:auto;
    padding:.4rem 0 .8rem; margin-bottom:.6rem;
    border-bottom:1.5px solid var(--line);
    scrollbar-width:thin;
  }
  .tab{
    background:transparent; border:none; padding:.55rem 1rem;
    font:inherit; font-size:.86rem; font-weight:600; color:var(--ink2);
    cursor:pointer; border-radius:9px 9px 0 0; white-space:nowrap;
    border-bottom:2.5px solid transparent;
    transition:color .15s, border-color .15s, background .15s;
  }
  .tab:hover{color:var(--ink); background:var(--soft)}
  .tab.active{color:var(--accent); border-color:var(--accent); background:var(--soft)}

  /* ── Panels ─────────────────────────────── */
  .panel{
    background:var(--panel); border:1px solid var(--line); border-radius:var(--radius);
    padding:1.1rem 1.3rem; margin-bottom:1rem;
    box-shadow:var(--shadow);
  }
  .panel h3{margin:0 0 .35rem;font-size:1.02rem;font-weight:700;letter-spacing:-.005em}
  .panel .sub{margin:0;color:var(--ink2);font-size:.86rem}
  .panel.tinted{background:linear-gradient(135deg,#eff6ff,#dbeafe);border-color:#bfdbfe}
  .panel.tinted h3{color:#1e40af}
  .panel.tinted-green{background:linear-gradient(135deg,#f0fdf4,#dcfce7);border-color:#86efac}
  .panel.tinted-green h3{color:#15803d}

  /* ── Buttons ─────────────────────────── */
  .btn{
    background:var(--soft); color:var(--ink); border:1.5px solid var(--line);
    padding:.55rem 1rem; border-radius:9px; font:inherit; font-weight:600; font-size:.88rem;
    cursor:pointer; display:inline-flex; align-items:center; gap:.4rem;
    transition:transform .08s, background .12s, border-color .12s, box-shadow .12s;
  }
  .btn:hover{background:#e6ecf5}
  .btn:active{transform:translateY(1px)}
  .btn-small{padding:.4rem .8rem; font-size:.82rem}
  .btn-primary{background:var(--accent); border-color:var(--accent); color:#fff}
  .btn-primary:hover{background:var(--accent-d); border-color:var(--accent-d)}
  .btn-green{background:var(--green); border-color:var(--green); color:#fff}
  .btn-green:hover{background:var(--green-d); border-color:var(--green-d)}
  .btn-red{background:var(--red); border-color:var(--red); color:#fff}
  .btn-red:hover{background:var(--red-d); border-color:var(--red-d)}
  .btn-orange{background:var(--orange); border-color:var(--orange); color:#fff}
  .btn-orange:hover{background:var(--orange-d); border-color:var(--orange-d)}
  .btn-ghost{background:transparent;border-color:transparent;color:var(--ink2)}
  .btn-ghost:hover{background:var(--soft)}
  .btn-row{display:flex;gap:.5rem;flex-wrap:wrap;margin-top:.7rem}

  /* ── Form fields ─────────────────────── */
  .field{display:block;margin-bottom:.7rem}
  .field label{display:block;font-size:.78rem;font-weight:600;color:var(--ink2);margin-bottom:.25rem;letter-spacing:.01em}
  .field input, .field select, .field textarea{
    width:100%; padding:.6rem .8rem;
    border:1.5px solid var(--line); border-radius:9px;
    background:#fff; color:var(--ink); font:inherit; font-size:.92rem;
    outline:none; transition:border-color .12s, box-shadow .12s;
  }
  .field input:focus, .field select:focus, .field textarea:focus{
    border-color:var(--accent); box-shadow:0 0 0 3px rgba(31,111,235,.15);
  }
  .field textarea{min-height:80px;resize:vertical}
  .field-row{display:grid;grid-template-columns:1fr 1fr;gap:.7rem}
  @media (max-width:520px){ .field-row{grid-template-columns:1fr} }

  /* ── Tables ───────────────────────────── */
  .grid-wrap{overflow-x:auto;border:1px solid var(--line);border-radius:10px;background:#fff}
  table.data{width:100%;border-collapse:collapse;font-size:.88rem}
  table.data th{
    background:var(--soft); color:var(--ink2); font-weight:700;
    text-align:left; padding:.6rem .8rem; font-size:.74rem;
    text-transform:uppercase; letter-spacing:.04em;
    border-bottom:1.5px solid var(--line);
  }
  table.data td{padding:.6rem .8rem; border-bottom:1px solid var(--line)}
  table.data tr:last-child td{border-bottom:none}
  table.data tr:hover{background:#fafbfc}
  table.data .num{text-align:center}
  table.data .final{text-align:center; background:#fef9e7; font-weight:700}

  /* Gradebook compact */
  table.gradebook{width:100%;border-collapse:collapse;font-size:.84rem;background:#fff}
  table.gradebook th{
    background:linear-gradient(135deg,#1e3c72,#2a5298); color:#fff;
    padding:.55rem .4rem; font-weight:700; font-size:.74rem;
    border-right:1px solid rgba(255,255,255,.15);
  }
  table.gradebook th:last-child{border-right:none}
  table.gradebook td{padding:4px 6px; border-bottom:1px solid var(--line); border-right:1px solid var(--line)}
  table.gradebook td:last-child{border-right:none}
  table.gradebook td.name{font-weight:600}
  table.gradebook td.center{text-align:center}
  table.gradebook td.final{background:#fef9e7;text-align:center;font-weight:800;color:var(--ink)}
  .gcell-input{
    width:54px;text-align:center;padding:6px 3px;
    border:1.5px solid var(--line); border-radius:7px; background:#fff;
    font-weight:700; font-size:.86rem; color:var(--ink);
    outline:none;
  }
  .gcell-input:focus{border-color:var(--accent); box-shadow:0 0 0 2px rgba(31,111,235,.15)}
  .col-x{
    background:transparent; border:none; color:rgba(255,255,255,.85);
    cursor:pointer; font-size:.8rem; padding:0 2px; line-height:1;
    border-radius:4px;
  }
  .col-x:hover{background:rgba(255,255,255,.18)}

  /* ── Chips & pills ──────────────────── */
  .chip{display:inline-block;padding:3px 10px;border-radius:100px;font-size:.74rem;font-weight:700}
  .chip-blue{background:#dbeafe;color:#1e40af;border:1.5px solid #93c5fd}
  .chip-green{background:#d1fae5;color:#065f46;border:1.5px solid #6ee7b7}
  .chip-red{background:#fee2e2;color:#991b1b;border:1.5px solid #fca5a5}
  .chip-orange{background:#ffedd5;color:#9a3412;border:1.5px solid #fdba74}
  .chip-gray{background:#f1f5f9;color:#475569;border:1.5px solid #cbd5e1}
  .pill{display:inline-block;padding:2px 9px;border-radius:100px;font-size:.72rem;font-weight:700}

  /* ── Cards (materials, exams) ──────── */
  .cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:.8rem}
  .card{
    background:#fff; border:1px solid var(--line); border-radius:var(--radius);
    padding:1rem; cursor:pointer; transition:transform .12s, box-shadow .12s, border-color .12s;
    display:flex; flex-direction:column; gap:.35rem;
  }
  .card:hover{transform:translateY(-2px); box-shadow:var(--shadow-lg); border-color:#bfdbfe}
  .card .icon{font-size:1.7rem; margin-bottom:.2rem}
  .card h4{margin:0;font-size:.95rem;font-weight:700;line-height:1.3}
  .card .desc{font-size:.82rem;color:var(--ink2);line-height:1.4}
  .card .tag{
    margin-top:auto; font-size:.74rem; font-weight:700; color:var(--accent);
    padding-top:.4rem;
  }

  /* ── List items ──────────────────────── */
  .item{
    display:flex; align-items:center; gap:.8rem;
    background:#fff; border:1px solid var(--line); border-radius:10px;
    padding:.7rem .9rem; margin-bottom:.5rem;
  }
  .item:hover{border-color:#cbd5e1}
  .item .icn{
    width:40px;height:40px;border-radius:10px;
    background:var(--soft); display:grid;place-items:center;
    font-size:1.15rem; flex-shrink:0;
  }
  .item .body{flex:1;min-width:0}
  .item .title{font-weight:700; font-size:.93rem; margin-bottom:.15rem}
  .item .meta{font-size:.78rem; color:var(--muted); display:flex; gap:.6rem; flex-wrap:wrap}
  .item .actions{display:flex;gap:.3rem;flex-shrink:0}
  .icon-btn{
    background:transparent;border:none;cursor:pointer;padding:.4rem;border-radius:7px;
    font-size:1rem; color:var(--ink2); line-height:1;
  }
  .icon-btn:hover{background:var(--soft)}
  .icon-btn.danger:hover{background:#fee2e2; color:var(--red)}

  /* ── Stats ──────────────────────────── */
  .stats{display:grid; grid-template-columns:repeat(auto-fit,minmax(150px,1fr)); gap:.7rem; margin-bottom:1rem}
  .stat{
    background:#fff; border:1px solid var(--line); border-radius:var(--radius);
    padding:.9rem 1rem; box-shadow:var(--shadow);
  }
  .stat .lbl{font-size:.72rem; font-weight:700; color:var(--muted); text-transform:uppercase; letter-spacing:.05em}
  .stat .val{font-size:1.7rem; font-weight:800; color:var(--ink); margin:.1rem 0; line-height:1}
  .stat .sub{font-size:.75rem; color:var(--muted)}
  .stat.green{border-left:4px solid var(--green)}
  .stat.blue{border-left:4px solid var(--accent)}
  .stat.orange{border-left:4px solid var(--orange)}

  /* ── Empty state ────────────────────── */
  .empty{
    text-align:center; padding:2.5rem 1.2rem; color:var(--muted);
    background:#fff; border:1px dashed var(--line); border-radius:var(--radius);
  }
  .empty .big{font-size:3rem; margin-bottom:.5rem; line-height:1}
  .empty p{margin:.3rem 0}

  /* ── Toast ──────────────────────────── */
  #toast{
    position:fixed; bottom:1.2rem; left:50%; transform:translateX(-50%) translateY(120%);
    background:#0b1727; color:#fff; padding:.7rem 1.2rem; border-radius:10px;
    font-size:.88rem; font-weight:600; z-index:9999;
    box-shadow:0 8px 24px rgba(0,0,0,.25);
    transition:transform .25s ease;
    max-width:90vw;
  }
  #toast.show{transform:translateX(-50%) translateY(0)}
  #toast.error{background:var(--red)}
  #toast.success{background:var(--green)}

  /* ── Modal ──────────────────────────── */
  #modal{
    position:fixed; inset:0; background:rgba(15,23,42,.55); z-index:9000;
    display:none; align-items:center; justify-content:center; padding:1rem;
    backdrop-filter:blur(2px);
  }
  #modal.open{display:flex}
  .modal-box{
    background:#fff; border-radius:14px; max-width:560px; width:100%;
    max-height:85vh; overflow:auto; box-shadow:0 20px 50px rgba(0,0,0,.3);
  }
  .modal-head{
    display:flex; justify-content:space-between; align-items:center;
    padding:1rem 1.3rem; border-bottom:1px solid var(--line);
    position:sticky; top:0; background:#fff; z-index:1;
  }
  .modal-head h3{margin:0;font-size:1.05rem;font-weight:700}
  .modal-close{
    background:transparent; border:none; font-size:1.4rem; cursor:pointer;
    color:var(--muted); padding:.2rem .5rem; border-radius:7px; line-height:1;
  }
  .modal-close:hover{background:var(--soft); color:var(--ink)}
  .modal-body{padding:1.2rem 1.3rem}

  /* ── Login landing ──────────────────── */
  .landing{
    max-width:520px; margin:2rem auto; padding:1rem;
  }
  .landing .hero{
    text-align:center; margin-bottom:1.5rem;
  }
  .landing .hero h1{font-size:1.7rem; margin:.4rem 0 .2rem; letter-spacing:-.015em}
  .landing .hero p{margin:0; color:var(--ink2); font-size:.95rem}
  .role-tabs{
    display:flex; gap:.4rem; background:var(--soft); padding:4px; border-radius:11px;
    margin-bottom:1rem;
  }
  .role-tab{
    flex:1; background:transparent; border:none; padding:.6rem .5rem;
    font:inherit; font-weight:700; font-size:.86rem; color:var(--ink2);
    cursor:pointer; border-radius:8px; text-align:center;
  }
  .role-tab.active{background:#fff; color:var(--ink); box-shadow:0 1px 4px rgba(0,0,0,.08)}

  /* ── Header bar (in-app) ─────────────── */
  .userbar{
    display:flex; align-items:center; gap:.7rem; flex-wrap:wrap;
    padding:.7rem 1rem; background:#fff; border:1px solid var(--line);
    border-radius:var(--radius); margin-bottom:1rem; box-shadow:var(--shadow);
  }
  .userbar .who{flex:1; min-width:200px}
  .userbar .who .name{font-weight:700; font-size:.95rem}
  .userbar .who .sub{font-size:.78rem; color:var(--muted)}

  /* ── Misc ───────────────────────────── */
  .hint{font-size:.78rem;color:var(--muted);margin-top:.4rem}
  .sep{height:1px;background:var(--line);margin:1rem 0}
  .badge-grado{background:#dbeafe;color:#1e40af}
  .badge-grupo{background:#dcfce7;color:#15803d}
  .live{
    display:inline-flex; align-items:center; gap:.35rem;
    background:#16a34a; color:#fff; padding:2px 9px; border-radius:100px;
    font-size:.68rem; font-weight:800; text-transform:uppercase; letter-spacing:.06em;
  }
  .live::before{content:''; width:6px;height:6px;border-radius:50%; background:#fff; animation:pulse 1.5s infinite}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}

  /* exam */
  .qbox{border:1px solid var(--line); border-radius:10px; padding:1rem; margin-bottom:.7rem; background:#fff}
  .qbox h4{margin:0 0 .6rem; font-size:.95rem}
  .opt{
    display:flex; align-items:center; gap:.6rem; padding:.55rem .8rem;
    border:1.5px solid var(--line); border-radius:9px; margin-bottom:.4rem;
    cursor:pointer; transition:border-color .12s, background .12s;
  }
  .opt:hover{border-color:#cbd5e1; background:var(--soft)}
  .opt.sel{border-color:var(--accent); background:#eff6ff}
  .opt input{margin:0}
</style>
</head>
<body>

<!-- ╔══════════════════════════════════════════════════════════════════════╗
     ║  PORTAL DE MATEMÁTICAS — versión nueva, independiente.                 ║
     ║  Esta es una aplicación completa de página única (SPA) que funciona    ║
     ║  100% en el navegador con localStorage. Cuando quieras compartir       ║
     ║  datos entre dispositivos, pega tu firebaseConfig en CONFIG.firebase   ║
     ║  (más abajo en el script) y la app se conectará automáticamente.       ║
     ╚══════════════════════════════════════════════════════════════════════╝ -->

<header class="topbar">
  <div class="brand">
    <div class="logo">🧮</div>
    <div>
      <h1>Portal de Matemáticas</h1>
      <p id="brandSub">Inicia sesión para continuar</p>
    </div>
  </div>
  <div class="right">
    <span class="conn offline" id="connBadge"><span class="conn-dot"></span><span id="connText">Modo local</span></span>
    <button class="btn btn-ghost btn-small" id="logoutBtn" onclick="logout()" style="display:none;color:#fff;border-color:rgba(255,255,255,.3)">Salir</button>
  </div>
</header>

<main id="app"></main>

<div id="toast"></div>
<div id="modal" onclick="if(event.target===this)closeModal()"><div class="modal-box" id="modalBox"></div></div>

<script>
'use strict';

/* ╔══════════════════════════════════════════════════════════════════════╗
   ║  ►►► CONFIGURACIÓN — EDITA ESTOS VALORES                             ◄◄◄  ║
   ╚══════════════════════════════════════════════════════════════════════╝ */
const CONFIG = {
  // Clave del almacenamiento local (no la cambies después de empezar a usar
  // la app, porque "perderías" los datos guardados con la clave anterior).
  storeKey: 'portalv2',

  // Credenciales del maestro.
  // El usuario es texto plano (no es secreto). La contraseña NUNCA viaja
  // en plano: se guarda solo el hash SHA-256 de la combinación  (sal + ":" + contraseña).
  // Si quieres cambiar la contraseña, abre la consola del navegador y ejecuta:
  //   await sha256(CONFIG.teacherPassSalt + ':' + 'tu_nueva_contraseña')
  // El valor que imprima reemplaza al de teacherPassHash.
  teacherUser:     'sultan',
  teacherPassSalt: 'portal-mate-9f3a8b2c',
  teacherPassHash: '2faec1bf4ab07023834f986d9848ae9fdd8e1aba02a068ed5c4a5fbb0ddebfa0',

  // Política de intentos: tras N intentos fallidos seguidos, bloqueo de M minutos.
  loginMaxAttempts: 5,
  loginLockoutMin:  5,

  // Grados y grupos que atiende el maestro. Estos son los únicos que
  // aparecerán en los selectores al agregar alumnos, materiales, tareas
  // y exámenes. Agrega o quita valores aquí cuando cambien tus grupos.
  grades: ['2','3'],            // segundos y terceros
  groups: ['H','I'],             // grupos H e I

  // Firebase: deja todo en "PEGAR_AQUI" para usar SOLO localStorage (un
  // navegador, sin sincronización entre dispositivos). Cuando estés listo,
  // crea un proyecto en https://console.firebase.google.com, activa
  // Realtime Database, y reemplaza cada valor por el de tu proyecto.
  firebase: {
    apiKey:            'PEGAR_AQUI',
    authDomain:        'PEGAR_AQUI',
    databaseURL:       'PEGAR_AQUI',
    projectId:         'PEGAR_AQUI',
    storageBucket:     'PEGAR_AQUI',
    messagingSenderId: 'PEGAR_AQUI',
    appId:             'PEGAR_AQUI'
  }
};

/* ╔══════════════════════════════════════════════════════════════════════╗
   ║  Estado de la aplicación                                              ║
   ╚══════════════════════════════════════════════════════════════════════╝ */
const state = {
  // Cada grupo agrupa alumnos, actividades y calificaciones del mismo grado/letra.
  groups: [],        // [{ id, grado, grupo, students:[{id,name,telefono,qrCode}], activities:[{id,name,createdAt}], grades:{ "sid_aid": "9.5" } }]
  materials: [],     // [{ id, type:'link'|'doc'|'img'|'game', title, desc, url, grado, grupo, createdAt }]
  tasks: [],         // [{ id, title, desc, url, dueDate, grado, grupo, done:{ studentId:true }, createdAt }]
  exams: [],         // [{ id, title, desc, grado, grupo, questions:[{q,opts:[],correct}], createdAt }]
  examResults: [],   // [{ examId, studentId, studentName, score, total, date }]
  session: null      // { role:'teacher'|'student'|'parent', name, code?, studentId?, grado?, grupo? }
};

/* ╔══════════════════════════════════════════════════════════════════════╗
   ║  Almacenamiento (localStorage + Firebase opcional)                    ║
   ╚══════════════════════════════════════════════════════════════════════╝ */
function persistLocal(){
  try{
    const data = {
      groups:state.groups, materials:state.materials, tasks:state.tasks,
      exams:state.exams, examResults:state.examResults, v:2
    };
    localStorage.setItem(CONFIG.storeKey, JSON.stringify(data));
  }catch(e){ console.warn('[storage] no se pudo guardar local:', e); }
}
function loadLocal(){
  try{
    const raw = localStorage.getItem(CONFIG.storeKey);
    if(!raw) return;
    const d = JSON.parse(raw);
    if(Array.isArray(d.groups))       state.groups       = d.groups;
    if(Array.isArray(d.materials))    state.materials    = d.materials;
    if(Array.isArray(d.tasks))        state.tasks        = d.tasks;
    if(Array.isArray(d.exams))        state.exams        = d.exams;
    if(Array.isArray(d.examResults))  state.examResults  = d.examResults;

const fb = { ready:false, db:null, suppress:false };
function firebaseConfigured(){
  const c = CONFIG.firebase;
  return c && c.apiKey && c.apiKey !== 'PEGAR_AQUI' && c.databaseURL && c.databaseURL !== 'PEGAR_AQUI';
}
function loadScript(src){
  return new Promise((res, rej)=>{
    const s = document.createElement('script');
    s.src = src; s.onload = res; s.onerror = ()=>rej(new Error('No se pudo cargar '+src));
    document.head.appendChild(s);
  });
}
async function fbInit(){
  if(!firebaseConfigured()) return;
  setConn('loading','Conectando…');
  try{
    await loadScript('https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js');
    await loadScript('https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js');
    if(!window.firebase) throw new Error('SDK no disponible');
    window.firebase.initializeApp(CONFIG.firebase);
    fb.db = window.firebase.database();
    fb.ready = true;
    fb.db.ref('.info/connected').on('value', snap=>{
      setConn(snap.val()?'online':'offline', snap.val()?'En línea':'Sin conexión');
    });
    fb.db.ref('portal/data').on('value', snap=>{
      const v = snap.val();
      if(!v) return;
      fb.suppress = true;
      try{
        if(Array.isArray(v.groups))      state.groups      = v.groups;
        if(Array.isArray(v.materials))   state.materials   = v.materials;
        if(Array.isArray(v.tasks))       state.tasks       = v.tasks;
        if(Array.isArray(v.exams))       state.exams       = v.exams;
        if(Array.isArray(v.examResults)) state.examResults = v.examResults;
        persistLocal();
        render();
      } finally { fb.suppress = false; }
    });
  }catch(e){
    console.error('[firebase] error:', e);
    setConn('offline','Firebase falló');
  }
}
function fbPush(){
  if(!fb.ready || fb.suppress) return;
  const data = {
    groups:state.groups, materials:state.materials, tasks:state.tasks,
    exams:state.exams, examResults:state.examResults,
    _updatedAt: new Date().toISOString()
  };
  fb.db.ref('portal/data').set(data).catch(e=>console.warn('[fb push]',e));
}

/* ── Seguridad: hash SHA-256 y control de intentos ─────────────
   La contraseña del maestro nunca se guarda en plano. Lo que se compara
   es el hash de (sal + ":" + contraseña). El usuario es público (no es
   secreto). El navegador trae Web Crypto, así que no hace falta librería. */
async function sha256(text){
  const data = new TextEncoder().encode(String(text));
  const buf  = await crypto.subtle.digest('SHA-256', data);
  return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
}

const ATTEMPTS_KEY = CONFIG.storeKey + '_login';

function getLoginState(){
  try{
    const raw = localStorage.getItem(ATTEMPTS_KEY);
    return raw ? JSON.parse(raw) : { fails:0, lockUntil:0, totalLockouts:0 };
  }catch(_){ return { fails:0, lockUntil:0, totalLockouts:0 }; }
}
function setLoginState(s){
  try{ localStorage.setItem(ATTEMPTS_KEY, JSON.stringify(s)); }catch(_){}
}
function lockoutRemainingMs(){
  const s = getLoginState();
  return Math.max(0, (s.lockUntil||0) - Date.now());
}
function isLockedOut(){ return lockoutRemainingMs() > 0; }
function recordFailedLogin(){
  const s = getLoginState();
  s.fails = (s.fails||0) + 1;
  if(s.fails >= CONFIG.loginMaxAttempts){
    s.totalLockouts = (s.totalLockouts||0) + 1;
    // Bloqueo creciente: 5 min, 15 min, 60 min, 4 h, 24 h
    const mins = [
      CONFIG.loginLockoutMin,
      CONFIG.loginLockoutMin * 3,
      CONFIG.loginLockoutMin * 12,
      CONFIG.loginLockoutMin * 48,
      CONFIG.loginLockoutMin * 288
    ];
    const m = mins[Math.min(s.totalLockouts-1, mins.length-1)];
    s.lockUntil = Date.now() + m * 60 * 1000;
    s.fails = 0;
  }
  setLoginState(s);
}
function clearFailedLogins(){
  setLoginState({ fails:0, lockUntil:0, totalLockouts:0 });
}
function attemptsRemaining(){
  const s = getLoginState();
  return Math.max(0, CONFIG.loginMaxAttempts - (s.fails||0));
}
function fmtLockoutTime(ms){
  const m = Math.ceil(ms/60000);
  if(m >= 60){
    const h = Math.floor(m/60), rm = m%60;
    return rm ? `${h} h ${rm} min` : `${h} h`;
  }
  return `${m} ${m===1?'minuto':'minutos'}`;
}

/* ╔══════════════════════════════════════════════════════════════════════╗
   ║  Helpers de datos                                                     ║
   ╚══════════════════════════════════════════════════════════════════════╝ */
function findGroup(grado, grupo){
  return state.groups.find(g=>String(g.grado)===String(grado) && String(g.grupo).toUpperCase()===String(grupo).toUpperCase());
}
function getOrCreateGroup(grado, grupo){
  let g = findGroup(grado, grupo);
  if(!g){
    g = {
      id:'g_'+uid(), grado:String(grado), grupo:String(grupo).toUpperCase(),
      students:[], activities:[], grades:{}
    };
    state.groups.push(g);
  }
  return g;
}
function sortedGroups(){
  return state.groups.slice().sort((a,b)=>{
    const ga = parseInt(a.grado)||0, gb = parseInt(b.grado)||0;
    if(ga!==gb) return ga-gb;
    return String(a.grupo).localeCompare(String(b.grupo));
  });
}
function findStudentByCode(code){
  const n = norm(code);
  for(const g of state.groups){
    const s = (g.students||[]).find(x=>norm(x.qrCode||x.id)===n);
    if(s) return { group:g, student:s };
  }
  return null;
}
function calcAvg(g, sid){
  const acts = g.activities||[]; const grades = g.grades||{};
  let sum=0, cnt=0;
  acts.forEach(a=>{
    const v = grades[sid+'_'+a.id];
    if(v===undefined||v===null||v==='') return;
    let n = NaN;
    if(v==='NE') n = 0;
    else if(typeof v==='string' && v.startsWith('T:')) n = parseFloat(v.slice(2));
    else n = parseFloat(v);
    if(!isNaN(n)){ sum+=n; cnt++; }
  });
  return cnt>0 ? sum/cnt : null;
}
function gradeChip(v){
  if(v===undefined||v===null||v==='') return '<span style="color:#cbd5e1">—</span>';
  if(v==='NE') return '<span class="chip chip-red">❌ NE</span>';
  if(typeof v==='string' && v.startsWith('T:')){
    const n = v.slice(2);
    return '<span class="chip chip-orange">⏰'+(n?' '+esc(n):'')+'</span>';
  }
  const num = parseFloat(v);
  if(!isNaN(num)){
    if(num>=9) return '<span class="chip chip-green">✨ '+esc(String(v))+'</span>';
    if(num>=6) return '<span class="chip chip-blue">'+esc(String(v))+'</span>';
    return '<span class="chip chip-red">'+esc(String(v))+'</span>';
  }
  return '<span class="chip chip-gray">'+esc(String(v))+'</span>';
}
function avgChip(avg){
  if(avg===null) return '<span class="chip chip-gray">—</span>';
  let cls='chip-gray';
  if(avg>=9) cls='chip-green';
  else if(avg>=6) cls='chip-blue';
  else cls='chip-red';
  return '<span class="chip '+cls+'" style="font-size:.92rem;padding:5px 14px">'+avg.toFixed(1)+'</span>';
}

        `}

      <p class="hint" style="text-align:center">
        ${firebaseConfigured()

function setLoginRole(r){ loginRole = r; render(); }

async function doLogin(){
  if(loginRole==='teacher'){
    // Verificar bloqueo
    if(isLockedOut()){
      toast(`Bloqueado. Espera ${fmtLockoutTime(lockoutRemainingMs())}`,'error');
      render();
      return;
    }
    const u = ($('#liUser')?.value||'').trim();
    const p = ($('#liPass')?.value||'');
    if(!u || !p){ toast('Escribe usuario y contraseña','error'); return; }
    // Hashear y comparar (la contraseña real NUNCA se guarda en el archivo)
    let hash;
    try{ hash = await sha256(CONFIG.teacherPassSalt + ':' + p); }
    catch(_){ toast('Tu navegador no soporta cifrado seguro','error'); return; }
    const ok = (u === CONFIG.teacherUser) && (hash === CONFIG.teacherPassHash);
    if(!ok){
      recordFailedLogin();
      const st = getLoginState();
      if(st.lockUntil && st.lockUntil > Date.now()){
        toast(`Demasiados intentos. Bloqueado por ${fmtLockoutTime(st.lockUntil - Date.now())}`,'error');
      } else {
        const left = attemptsRemaining();
        toast(`Credenciales incorrectas. Te quedan ${left} ${left===1?'intento':'intentos'}.`,'error');
      }
      // Limpiar campo contraseña y refrescar UI
      const pwd = document.getElementById('liPass'); if(pwd) pwd.value = '';
      render();
      return;
    }
    clearFailedLogins();
    state.session = { role:'teacher', name:'Maestro/a' };
    render();
    toast('Bienvenido/a','success');
    return;
  }
  const code = ($('#liCode')?.value||'').trim();
  if(!code){ toast('Escribe el código','error'); return; }
  const found = findStudentByCode(code);
  if(!found){ toast('Código no encontrado. Verifica con tu maestro.','error'); return; }
  state.session = {
    role: loginRole,
    name: found.student.name,
    code: code.toUpperCase(),
    studentId: found.student.id,
    grado: found.group.grado,
    grupo: found.group.grupo
  };
  render();
  toast(`Hola, ${found.student.name}`,'success');
}
function logout(){
  if(!state.session) return;
  if(!confirm('¿Cerrar sesión?')) return;
  state.session = null;
  render();
}

  const code = ($('#alCode')?.value||'').trim().toUpperCase();
  const tel = ($('#alTel')?.value||'').trim();
  if(!name){ toast('Falta el nombre','error'); return; }
  if(!code){ toast('Falta el código','error'); return; }
  // Validar que el código sea único (excluyendo el propio si edita)
  const conflict = findStudentByCode(code);
  if(conflict && (!id || conflict.student.id!==id)){
    toast('Ese código ya lo usa otro alumno: '+conflict.student.name,'error'); return;
  }
  if(id){
    // Editar: buscar al alumno, posiblemente moverlo de grupo
    let found = null;
    for(const gr of state.groups){
      const st = (gr.students||[]).find(x=>x.id===id);
      if(st){ found = { group:gr, student:st }; break; }
    }
    if(!found){ toast('Alumno no encontrado','error'); return; }
    const sameGroup = String(found.group.grado)===String(grado) && String(found.group.grupo).toUpperCase()===grupo;
    if(!sameGroup){
      // mover al alumno y arrastrar sus calificaciones
      const newG = getOrCreateGroup(grado, grupo);
      // copiar calificaciones existentes para este alumno hacia las actividades del nuevo grupo solo si coinciden por nombre
      // simplificación: no se arrastran; las del grupo anterior se borran junto con el alumno
      found.group.students = found.group.students.filter(x=>x.id!==id);
      // limpiar grades del grupo anterior asociadas al alumno
      Object.keys(found.group.grades||{}).forEach(k=>{ if(k.startsWith(id+'_')) delete found.group.grades[k]; });
      newG.students.push({ id, name, telefono:tel, qrCode:code });
    } else {
      found.student.name = name;
      found.student.telefono = tel;
      found.student.qrCode = code;
    }
  } else {
    const g = getOrCreateGroup(grado, grupo);
    g.students.push({ id:'s_'+uid(), name, telefono:tel, qrCode:code });
  }
  save(); render(); closeModal();
  toast(id?'Alumno actualizado':'Alumno agregado','success');
}

function deleteAlumno(id){
  let found = null;
  for(const gr of state.groups){
    const st = (gr.students||[]).find(x=>x.id===id);
    if(st){ found = { group:gr, student:st }; break; }
  }
  if(!found) return;
  if(!confirm(`¿Eliminar al alumno "${found.student.name}"?\n\nSe borrarán también sus calificaciones.`)) return;
  found.group.students = found.group.students.filter(x=>x.id!==id);
  Object.keys(found.group.grades||{}).forEach(k=>{ if(k.startsWith(id+'_')) delete found.group.grades[k]; });
  save(); render();
  toast('Alumno eliminado','success');
}

function exportarAlumnosCSV(){
  const rows = [['Grado','Grupo','Nombre','Código','Teléfono']];
  sortedGroups().forEach(g=>{
    (g.students||[]).forEach(s=>{
      rows.push([gradoLabel(g.grado), g.grupo, s.name, s.qrCode||s.id, s.telefono||'']);
    });
  });
  const csv = rows.map(r=>r.map(c=>`"${String(c).replace(/"/g,'""')}"`).join(',')).join('\n');
  const blob = new Blob(['\ufeff'+csv], {type:'text/csv;charset=utf-8'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = 'alumnos.csv'; a.click();
  URL.revokeObjectURL(url);
  toast('Lista descargada','success');
}

        <td class="center" style="color:var(--muted)">${i+1}</td>

function addActividad(gid){
  const inp = document.getElementById('newAct_'+gid);
  const name = (inp?.value||'').trim();
  if(!name){ toast('Escribe un nombre','error'); return; }
  const g = state.groups.find(x=>x.id===gid); if(!g) return;
  if(!Array.isArray(g.activities)) g.activities = [];
  g.activities.push({ id:'a_'+uid(), name, createdAt:new Date().toISOString() });
  save(); render();
  toast(`Actividad "${name}" agregada`,'success');
}
function deleteActividad(gid, aid){
  const g = state.groups.find(x=>x.id===gid); if(!g) return;
  const a = (g.activities||[]).find(x=>x.id===aid);
  if(!confirm(`¿Eliminar la actividad "${a?a.name:''}" y todas sus calificaciones?`)) return;
  g.activities = (g.activities||[]).filter(x=>x.id!==aid);
  if(g.grades) Object.keys(g.grades).forEach(k=>{ if(k.endsWith('_'+aid)) delete g.grades[k]; });
  save(); render();
  toast('Actividad eliminada','success');
}
function setGrade(gid, sid, aid, val){
  const g = state.groups.find(x=>x.id===gid); if(!g) return;
  if(!g.grades) g.grades = {};
  const key = sid+'_'+aid;
  val = String(val==null?'':val).trim();
  if(val==='') delete g.grades[key];
  else g.grades[key] = val;
  save();
  const avg = calcAvg(g, sid);
  const cell = document.getElementById('avg_'+gid+'_'+sid);
  if(cell) cell.textContent = avg!==null ? avg.toFixed(1) : '–';
}

let _taskAttachment = null;
function onTaskFileChosen(ev){
  const f = ev.target.files[0]; if(!f) return;
  const sizeMB = f.size/1024/1024;
  if(sizeMB > 2){
    if(!confirm(`El archivo pesa ${sizeMB.toFixed(1)} MB. Archivos grandes pueden hacer lenta la app o saturar el almacenamiento. ¿Continuar?`)){
      ev.target.value = ''; return;
    }
  }
  const r = new FileReader();
  r.onload = e => {
    _taskAttachment = { name:f.name, dataUrl:e.target.result, size:f.size, type:f.type||'' };
    const info = document.getElementById('tkAttachInfo');
    if(info) info.innerHTML = `📎 <strong>${esc(f.name)}</strong> <span style="color:var(--muted)">(${(f.size/1024).toFixed(0)} KB)</span> <a href="#" onclick="event.preventDefault();_taskAttachment=null;document.getElementById('tkFile').value='';document.getElementById('tkAttachInfo').innerHTML='';" style="margin-left:.5rem;color:var(--red)">quitar</a>`;
  };
  r.onerror = () => toast('No se pudo leer el archivo','error');
  r.readAsDataURL(f);
}
function saveTarea(){
  const urlField = $('#tkUrl').value.trim();
  // Si hay archivo adjunto, gana sobre el enlace
  const url = _taskAttachment ? _taskAttachment.dataUrl : urlField;
  const attachmentName = _taskAttachment ? _taskAttachment.name : '';
  const obj = {
    id:'t_'+uid(),
    title: $('#tkTitle').value.trim(), desc: $('#tkDesc').value.trim(),
    url, attachmentName,
    dueDate: $('#tkDue').value, grado: $('#tkGrado').value, grupo: $('#tkGrupo').value,
    done: {}, createdAt: new Date().toISOString()
  };
  if(!obj.title){ toast('Falta el título','error'); return; }
  state.tasks.push(obj);
  try{
    save();
  } catch(e){
    toast('No se pudo guardar (¿archivo muy grande?). Inténtalo con uno más pequeño.','error');
    state.tasks.pop();
    return;
  }
  _taskAttachment = null;
  render(); closeModal();
  toast('Tarea publicada','success');
}
function deleteTarea(id){
  if(!confirm('¿Eliminar esta tarea?')) return;
  state.tasks = state.tasks.filter(x=>x.id!==id);
  save(); render(); toast('Tarea eliminada','success');
}

        <strong style="font-size:.85rem">Pregunta ${qi+1}</strong>
        ${d.questions.length>1?`<button class="icon-btn danger" onclick="exDelQ(${qi})" title="Quitar">🗑️</button>`:''}
      </div>
      <div class="field" style="margin-bottom:.5rem"><input type="text" placeholder="Texto de la pregunta" value="${esc(q.q)}" oninput="_examDraft.questions[${qi}].q=this.value"></div>
      ${q.opts.map((o,oi)=>`
        <div style="display:flex;align-items:center;gap:.5rem;margin-bottom:.35rem">
          <input type="radio" name="qcorr${qi}" ${q.correct===oi?'checked':''} onchange="_examDraft.questions[${qi}].correct=${oi}" title="Respuesta correcta">
          <input type="text" placeholder="Opción ${String.fromCharCode(65+oi)}" value="${esc(o)}" oninput="_examDraft.questions[${qi}].opts[${oi}]=this.value" style="flex:1;padding:.4rem .6rem;border:1.5px solid var(--line);border-radius:7px;font:inherit;font-size:.86rem">
        </div>
      `).join('')}
      <p class="hint">Marca el círculo de la opción correcta.</p>
    </div>
  `).join('');
  openModal(`
    <div class="modal-head"><h3>📝 Nuevo examen</h3><button class="modal-close" onclick="closeModal()">×</button></div>
    <div class="modal-body">
      <div class="field"><label>Título *</label><input type="text" value="${esc(d.title)}" oninput="_examDraft.title=this.value" placeholder="Ej: Examen del bloque 1"></div>
      <div class="field"><label>Descripción</label><textarea oninput="_examDraft.desc=this.value" placeholder="Instrucciones para el alumno">${esc(d.desc)}</textarea></div>
      <div class="field-row">
        <div class="field"><label>Grado</label>
          <select onchange="_examDraft.grado=this.value">
            <option value="all"${d.grado==='all'?' selected':''}>Todos los grados</option>
            ${CONFIG.grades.map(G=>`<option value="${G}"${d.grado===G?' selected':''}>${gradoLabel(G)}</option>`).join('')}
          </select>
        </div>
        <div class="field"><label>Grupo</label>
          <select onchange="_examDraft.grupo=this.value">
            <option value="all"${d.grupo==='all'?' selected':''}>Todos los grupos</option>
            ${CONFIG.groups.map(L=>`<option value="${L}"${d.grupo===L?' selected':''}>${L}</option>`).join('')}
          </select>
        </div>
      </div>
      <h4 style="margin:1rem 0 .5rem">Preguntas</h4>
      ${qhtml}
      <button class="btn btn-small" onclick="exAddQ()">➕ Agregar pregunta</button>
      <div class="btn-row" style="justify-content:flex-end;margin-top:1.2rem">
        <button class="btn" onclick="closeModal()">Cancelar</button>
        <button class="btn btn-primary" onclick="saveExamen()">Crear examen</button>
      </div>
    </div>
  `);
}
function exAddQ(){ _examDraft.questions.push({q:'',opts:['','','',''], correct:0}); renderExamenModal(); }
function exDelQ(i){ _examDraft.questions.splice(i,1); renderExamenModal(); }
function saveExamen(){
  const d = _examDraft;
  if(!d.title.trim()){ toast('Falta el título','error'); return; }
  if(!d.questions.length){ toast('Agrega al menos una pregunta','error'); return; }
  for(const q of d.questions){
    if(!q.q.trim()){ toast('Hay preguntas sin texto','error'); return; }
    if(q.opts.some(o=>!o.trim())){ toast('Hay opciones vacías','error'); return; }
  }
  state.exams.push({
    id:'e_'+uid(), title:d.title.trim(), desc:d.desc.trim(),
    grado:d.grado, grupo:d.grupo, questions:d.questions,
    createdAt: new Date().toISOString()
  });
  save(); render(); closeModal();
  toast('Examen creado','success');
}
function deleteExamen(id){
  if(!confirm('¿Eliminar este examen?\nTambién se borrarán las respuestas de los alumnos.')) return;
  state.exams = state.exams.filter(x=>x.id!==id);
  state.examResults = state.examResults.filter(r=>r.examId!==id);
  save(); render(); toast('Examen eliminado','success');
}
function verResultadosExamen(id){
  const e = state.exams.find(x=>x.id===id); if(!e) return;
  const results = state.examResults.filter(r=>r.examId===id).sort((a,b)=>String(a.studentName).localeCompare(String(b.studentName),'es'));
  const rows = results.length ? results.map(r=>{
    const calif = ((r.score/r.total)*10).toFixed(1);
    return `<tr><td>${esc(r.studentName)}</td><td class="num">${r.score}/${r.total}</td><td class="num">${gradeChip(calif)}</td><td class="num" style="font-size:.78rem;color:var(--muted)">${fmtDate(r.date)}</td></tr>`;
  }).join('') : `<tr><td colspan="4" style="text-align:center;color:var(--muted);padding:1.5rem">Sin respuestas todavía</td></tr>`;
  openModal(`
    <div class="modal-head"><h3>📊 ${esc(e.title)}</h3><button class="modal-close" onclick="closeModal()">×</button></div>
    <div class="modal-body">
      <p class="sub" style="margin-bottom:.7rem">${results.length} respuestas</p>
      <div class="grid-wrap"><table class="data">
        <thead><tr><th>Alumno</th><th class="num">Aciertos</th><th class="num">Calif. (10)</th><th class="num">Fecha</th></tr></thead>
        <tbody>${rows}</tbody>
      </table></div>
    </div>
  `);
}

/* ── 6) Respaldo ─────────────────────────── */
function viewRespaldo(){
  const total = state.groups.reduce((a,g)=>a+(g.students||[]).length,0);
  return `
    <div class="panel tinted">
      <h3>💾 Respaldo y restauración</h3>
      <p class="sub">Descarga una copia de tus datos en cualquier momento. Si necesitas mover tu información a otro navegador o restaurarla, importa el archivo.</p>
    </div>
    <div class="stats">
      <div class="stat blue"><div class="lbl">Grupos</div><div class="val">${state.groups.length}</div></div>
      <div class="stat green"><div class="lbl">Alumnos</div><div class="val">${total}</div></div>
      <div class="stat blue"><div class="lbl">Materiales</div><div class="val">${state.materials.length}</div></div>
      <div class="stat orange"><div class="lbl">Tareas</div><div class="val">${state.tasks.length}</div></div>
      <div class="stat blue"><div class="lbl">Exámenes</div><div class="val">${state.exams.length}</div></div>
    </div>
    <div class="panel">
      <h3>Descargar / Restaurar</h3>
      <p class="sub">El archivo .json contiene todos tus alumnos, calificaciones, materiales, tareas y exámenes.</p>
      <div class="btn-row">
        <button class="btn btn-primary btn-small" onclick="exportBackup()">📥 Descargar respaldo (.json)</button>
        <input type="file" id="bkFile" accept=".json" style="display:none" onchange="importBackup(event)">
        <button class="btn btn-small" onclick="document.getElementById('bkFile').click()">📤 Restaurar desde archivo</button>
        <button class="btn btn-red btn-small" onclick="wipeAll()" style="margin-left:auto">🗑️ Borrar todo</button>
      </div>
      <p class="hint" style="margin-top:.7rem">⚠️ Restaurar reemplazará tus datos actuales por los del archivo.</p>
    </div>
    <div class="panel">
      <h3>☁️ Sincronización con Firebase</h3>
      ${firebaseConfigured()
        ? `<p class="sub"><span class="live">Configurado</span> Los datos se sincronizan automáticamente entre dispositivos.</p>`
        : `<p class="sub">No configurado. Los datos sólo se guardan en este navegador. Para sincronizar entre dispositivos, edita la sección <code>CONFIG.firebase</code> del archivo y pega los valores de tu proyecto.</p>`}
    </div>
  `;
}
function exportBackup(){
  const data = {
    portal:'v2', exportedAt: new Date().toISOString(),
    groups:state.groups, materials:state.materials, tasks:state.tasks,
    exams:state.exams, examResults:state.examResults
  };
  const blob = new Blob([JSON.stringify(data,null,2)], {type:'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = `portal-respaldo-${new Date().toISOString().slice(0,10)}.json`; a.click();
  URL.revokeObjectURL(url);
  toast('Respaldo descargado','success');
}
function importBackup(ev){
  const f = ev.target.files[0]; if(!f) return;
  const r = new FileReader();
  r.onload = e => {
    try{
      const d = JSON.parse(e.target.result);
      if(!confirm('¿Reemplazar TODOS los datos actuales por los del respaldo?')) return;
      state.groups       = Array.isArray(d.groups)?d.groups:[];
      state.materials    = Array.isArray(d.materials)?d.materials:[];
      state.tasks        = Array.isArray(d.tasks)?d.tasks:[];
      state.exams        = Array.isArray(d.exams)?d.exams:[];
      state.examResults  = Array.isArray(d.examResults)?d.examResults:[];
      save(); render();
      toast('Datos restaurados','success');
    }catch(_){ toast('Archivo no válido','error'); }
  };
  r.readAsText(f);
  ev.target.value = '';
}
function wipeAll(){
  if(!confirm('¿Borrar TODOS los datos? Esta acción no se puede deshacer.')) return;
  if(!confirm('Última oportunidad. ¿Confirmas borrar todo?')) return;
  state.groups = []; state.materials = []; state.tasks = []; state.exams = []; state.examResults = [];
  save(); render(); toast('Todo borrado','success');
}

let studentTab = 'mat';
const STUDENT_TABS = [
  {id:'mat',     label:'📁 Materiales'},
  {id:'tareas',  label:'📌 Tareas'},
  {id:'calif',   label:'📊 Calificaciones'},
  {id:'ex',      label:'📝 Exámenes'}
];
function renderStudentShell(){
  return `
    <div class="userbar">
      <div class="who">
        <div class="name">🧑‍🎓 ${esc(state.session.name)}</div>
        <div class="sub"><span class="pill badge-grado">${gradoLabel(state.session.grado)}</span> <span class="pill badge-grupo">Grupo ${esc(state.session.grupo)}</span> · 🔑 ${esc(state.session.code)}</div>
      </div>
    </div>
    <div class="tabs" id="studentTabs"></div>
    <div id="studentBody"></div>
  `;
}
function renderStudentTabs(){
  document.getElementById('studentTabs').innerHTML = STUDENT_TABS.map(t=>`<button class="tab ${studentTab===t.id?'active':''}" onclick="setStudentTab('${t.id}')">${t.label}</button>`).join('');
  renderStudentBody();
}
function setStudentTab(id){ studentTab = id; renderStudentTabs(); }
function studentMatches(item){
  return (item.grado==='all'||String(item.grado)===String(state.session.grado))
      && (item.grupo==='all'||String(item.grupo).toUpperCase()===String(state.session.grupo).toUpperCase());
}
function renderStudentBody(){
  const c = document.getElementById('studentBody');
  if(studentTab==='mat')         c.innerHTML = studentMateriales();
  else if(studentTab==='tareas') c.innerHTML = studentTareas();
  else if(studentTab==='calif')  c.innerHTML = studentCalif();
  else if(studentTab==='ex')     c.innerHTML = studentExamenes();
}

function studentMateriales(){
  const mine = state.materials.filter(studentMatches);
  if(!mine.length) return `<div class="empty"><div class="big">📁</div><p>Tu maestro aún no ha publicado materiales para tu grupo.</p></div>`;
  const icons = {link:'🔗', doc:'📄', img:'🖼️', game:'🎮'};
  const groups = {link:[], doc:[], img:[], game:[]};
  mine.forEach(m=>{ (groups[m.type]||groups.link).push(m); });
  const titles = {link:'🔗 Enlaces', doc:'📄 Documentos', img:'🖼️ Imágenes', game:'🎮 Juegos'};
  let html = '';
  for(const k of ['link','doc','img','game']){
    if(!groups[k].length) continue;
    html += `<div class="panel"><h3>${titles[k]}</h3><div class="cards">${
      groups[k].map(m=>`
        <a class="card" href="${esc(m.url)}" target="_blank" style="text-decoration:none;color:inherit">
          <div class="icon">${icons[m.type]||'📁'}</div>
          <h4>${esc(m.title)}</h4>
          ${m.desc?`<div class="desc">${esc(m.desc)}</div>`:''}
          <div class="tag">Abrir ↗</div>
        </a>`).join('')
    }</div></div>`;
  }
  return html;
}

function studentTareas(){
  const mine = state.tasks.filter(studentMatches).slice().sort((a,b)=>{
    // pendientes primero (sin marcar), luego por fecha
    const da = a.done?.[state.session.studentId]?1:0, db = b.done?.[state.session.studentId]?1:0;
    if(da!==db) return da-db;
    return (a.dueDate||'').localeCompare(b.dueDate||'');
  });
  if(!mine.length) return `<div class="empty"><div class="big">📌</div><p>No tienes tareas pendientes.</p></div>`;
  return mine.map(t=>{
    const done = !!(t.done&&t.done[state.session.studentId]);
    const venceLabel = t.dueDate ? `📅 Vence ${fmtDate(t.dueDate)}` : '';
    return `
      <div class="panel" style="border-left:5px solid ${done?'var(--green)':'var(--orange)'}">
        <div style="display:flex;gap:.7rem;align-items:flex-start;flex-wrap:wrap">
          <div style="flex:1;min-width:200px">
            <h3>${done?'✅':'📌'} ${esc(t.title)}</h3>
            ${t.desc?`<p class="sub" style="margin-top:.3rem">${esc(t.desc)}</p>`:''}
            <div style="font-size:.78rem;color:var(--muted);margin-top:.4rem">${venceLabel}</div>
            ${t.url?`<a class="btn btn-small" style="margin-top:.5rem" href="${esc(t.url)}" target="_blank" ${t.attachmentName?`download="${esc(t.attachmentName)}"`:''}>${t.attachmentName?'📎 Descargar '+esc(t.attachmentName):'↗ Abrir enlace'}</a>`:''}
          </div>
          <button class="btn ${done?'btn-green':'btn-primary'} btn-small" onclick="toggleTarea('${t.id}')">${done?'✓ Terminada':'Marcar como terminada'}</button>
        </div>
      </div>
    `;
  }).join('');
}
function toggleTarea(id){
  const t = state.tasks.find(x=>x.id===id); if(!t) return;
  if(!t.done) t.done = {};
  t.done[state.session.studentId] = !t.done[state.session.studentId];
  save(); render();
}

function studentCalif(){
  const myGroup = state.groups.find(g=>(g.students||[]).some(s=>s.id===state.session.studentId));
  if(!myGroup) return `<div class="empty"><div class="big">📊</div><p>Aún no estás registrado/a en ningún grupo.</p></div>`;
  const me = myGroup.students.find(s=>s.id===state.session.studentId);
  const acts = myGroup.activities||[];
  const avg = calcAvg(myGroup, me.id);
  if(!acts.length) return `<div class="panel"><h3>📊 Mis calificaciones</h3><p class="sub">Tu maestro aún no ha registrado actividades calificadas.</p></div>`;
  const rows = acts.map(a=>{
    const v = (myGroup.grades||{})[me.id+'_'+a.id];
    return `<tr><td><strong>${esc(a.name)}</strong></td><td class="num">${gradeChip(v)}</td></tr>`;
  }).join('');
  return `
    <div class="panel tinted">
      <h3>📊 Mis calificaciones</h3>
      <p class="sub">${gradoLabel(myGroup.grado)} Grupo ${esc(myGroup.grupo)}</p>
    </div>
    <div class="panel">
      <div class="grid-wrap"><table class="data">
        <thead><tr><th>Actividad</th><th class="num" style="min-width:120px">Calificación</th></tr></thead>
        <tbody>${rows}</tbody>
      </table></div>
      <div style="margin-top:1rem;display:flex;align-items:center;gap:.6rem">
        <span style="font-weight:700;color:var(--ink2)">Promedio:</span> ${avgChip(avg)}
      </div>
    </div>
    <div class="panel" style="background:var(--soft)">
      <h3 style="font-size:.85rem">🎨 Leyenda</h3>
      <div style="display:flex;gap:.6rem;flex-wrap:wrap;font-size:.78rem">
        ${gradeChip('10')} Excelente (9–10)
        ${gradeChip('7')} Aprobado (6–8)
        ${gradeChip('5')} Reprobado (&lt;6)
        ${gradeChip('NE')} No entregó
      </div>
    </div>
  `;
}

function studentExamenes(){
  const mine = state.exams.filter(studentMatches);
  if(!mine.length) return `<div class="empty"><div class="big">📝</div><p>No hay exámenes para ti por ahora.</p></div>`;
  return `<div class="cards">${
    mine.map(e=>{
      const r = state.examResults.find(x=>x.examId===e.id && x.studentId===state.session.studentId);
      return `
        <div class="card" onclick="${r?`mostrarResultado('${e.id}')`:`empezarExamen('${e.id}')`}">
          <div class="icon">📝</div>
          <h4>${esc(e.title)}</h4>
          ${e.desc?`<div class="desc">${esc(e.desc)}</div>`:''}
          <div class="tag">${r?`✓ Calif: ${((r.score/r.total)*10).toFixed(1)}`:`${e.questions.length} preguntas`}</div>
        </div>
      `;
    }).join('')
  }</div>`;
}
let _currentExam = null, _examAns = [];
function empezarExamen(id){
  const e = state.exams.find(x=>x.id===id); if(!e) return;
  _currentExam = e; _examAns = new Array(e.questions.length).fill(-1);
  document.getElementById('studentBody').innerHTML = renderTomarExamen();
}
function renderTomarExamen(){
  const e = _currentExam;
  return `
    <div class="panel">
      <h3>📝 ${esc(e.title)}</h3>
      ${e.desc?`<p class="sub">${esc(e.desc)}</p>`:''}
    </div>
    ${e.questions.map((q,qi)=>`
      <div class="qbox">
        <h4>${qi+1}. ${esc(q.q)}</h4>
        ${q.opts.map((o,oi)=>`
          <label class="opt ${_examAns[qi]===oi?'sel':''}" onclick="_pickAns(${qi},${oi})">
            <input type="radio" name="eq${qi}" ${_examAns[qi]===oi?'checked':''} onchange="_pickAns(${qi},${oi})">
            <span>${esc(o)}</span>
          </label>
        `).join('')}
      </div>
    `).join('')}
    <div class="btn-row" style="justify-content:flex-end">
      <button class="btn" onclick="_cancelExam()">Cancelar</button>
      <button class="btn btn-primary" onclick="_submitExam()">✓ Enviar respuestas</button>
    </div>
  `;
}
function _pickAns(qi, oi){
  _examAns[qi] = oi;
  document.getElementById('studentBody').innerHTML = renderTomarExamen();
}
function _cancelExam(){ _currentExam=null; _examAns=[]; render(); }
function _submitExam(){
  if(_examAns.some(a=>a<0) && !confirm('Hay preguntas sin contestar. ¿Enviar de todas formas?')) return;
  let score = 0;
  _currentExam.questions.forEach((q,i)=>{ if(_examAns[i]===q.correct) score++; });
  const total = _currentExam.questions.length;
  state.examResults.push({
    examId:_currentExam.id, studentId:state.session.studentId, studentName:state.session.name,
    score, total, date: new Date().toISOString()
  });
  save();
  const calif = ((score/total)*10).toFixed(1);
  _currentExam = null; _examAns = [];
  render();
  toast(`Calificación: ${calif} (${score}/${total})`,'success');
}
function mostrarResultado(id){
  const r = state.examResults.find(x=>x.examId===id && x.studentId===state.session.studentId);
  const e = state.exams.find(x=>x.id===id);
  if(!r||!e) return;
  const calif = ((r.score/r.total)*10).toFixed(1);
  openModal(`
    <div class="modal-head"><h3>${esc(e.title)}</h3><button class="modal-close" onclick="closeModal()">×</button></div>
    <div class="modal-body" style="text-align:center">
      <div style="font-size:3rem">🎉</div>
      <p>Ya contestaste este examen</p>
      <div style="font-size:2.6rem;font-weight:800;color:var(--green);margin:.4rem 0">${calif}</div>
      <p style="color:var(--muted)">${r.score} de ${r.total} aciertos · ${fmtDate(r.date)}</p>
    </div>
  `);
}

    </div>
    <div class="panel">
      <div class="grid-wrap"><table class="data">
        <thead><tr><th>Actividad</th><th class="num" style="min-width:120px">Calificación</th></tr></thead>
        <tbody>${rows}</tbody>
      </table></div>
      <div style="margin-top:1rem;display:flex;align-items:center;gap:.6rem">
        <span style="font-weight:700;color:var(--ink2)">Promedio:</span> ${avgChip(avg)}
      </div>
    </div>
    <div class="panel" style="background:var(--soft)">
      <h3 style="font-size:.85rem">🎨 Leyenda</h3>
      <div style="display:flex;gap:.6rem;flex-wrap:wrap;font-size:.78rem">
        ${gradeChip('10')} Excelente (9–10)
        ${gradeChip('7')} Aprobado (6–8)
        ${gradeChip('5')} Reprobado (&lt;6)
        ${gradeChip('NE')} No entregó
      </div>
    </div>
  `;
}

function parentTareas(){
  const myGroup = state.groups.find(g=>(g.students||[]).some(s=>s.id===state.session.studentId));
  if(!myGroup) return `<div class="empty"><div class="big">📌</div><p>Sin información.</p></div>`;
  const sid = state.session.studentId;
  const mine = state.tasks.filter(t=>
    (t.grado==='all'||String(t.grado)===String(myGroup.grado)) &&
    (t.grupo==='all'||String(t.grupo).toUpperCase()===String(myGroup.grupo).toUpperCase())
  );
  if(!mine.length) return `<div class="empty"><div class="big">📌</div><p>El maestro no ha publicado tareas.</p></div>`;
  return mine.slice().sort((a,b)=>(b.createdAt||'').localeCompare(a.createdAt||'')).map(t=>{
    const done = !!(t.done&&t.done[sid]);
    return `
      <div class="panel" style="border-left:5px solid ${done?'var(--green)':'var(--orange)'}">
        <h3>${done?'✅':'📌'} ${esc(t.title)} <span class="pill ${done?'chip-green':'chip-orange'}" style="margin-left:.5rem">${done?'Entregada':'Pendiente'}</span></h3>
        ${t.desc?`<p class="sub">${esc(t.desc)}</p>`:''}
        ${t.url?`<a class="btn btn-small" style="margin-top:.5rem" href="${esc(t.url)}" target="_blank" ${t.attachmentName?`download="${esc(t.attachmentName)}"`:''}>${t.attachmentName?'📎 Descargar '+esc(t.attachmentName):'↗ Abrir enlace'}</a>`:''}
        <div style="font-size:.78rem;color:var(--muted);margin-top:.4rem">${t.dueDate?`📅 Vence ${fmtDate(t.dueDate)}`:''}</div>
      </div>
    `;
  }).join('');
}

function parentResumen(){
  const myGroup = state.groups.find(g=>(g.students||[]).some(s=>s.id===state.session.studentId));
  if(!myGroup) return `<div class="empty"><div class="big">🏆</div><p>Sin información.</p></div>`;
  const me = myGroup.students.find(s=>s.id===state.session.studentId);
  const avg = calcAvg(myGroup, me.id);
  const totalActs = (myGroup.activities||[]).length;
  const graded = (myGroup.activities||[]).filter(a=>{
    const v = (myGroup.grades||{})[me.id+'_'+a.id];
    return v!==undefined && v!==null && v!=='';
  }).length;
  // tareas
  const sid = state.session.studentId;
  const tasks = state.tasks.filter(t=>
    (t.grado==='all'||String(t.grado)===String(myGroup.grado)) &&
    (t.grupo==='all'||String(t.grupo).toUpperCase()===String(myGroup.grupo).toUpperCase())
  );
  const tareasHechas = tasks.filter(t=>t.done&&t.done[sid]).length;
  // exámenes
  const examResults = state.examResults.filter(r=>r.studentId===sid);
  return `
    <div class="panel tinted-green">
      <h3>🏆 Resumen general de ${esc(me.name)}</h3>
      <p class="sub">${gradoLabel(myGroup.grado)} Grupo ${esc(myGroup.grupo)}</p>
    </div>
    <div class="stats">
      <div class="stat green"><div class="lbl">Promedio general</div><div class="val">${avg!==null?avg.toFixed(1):'—'}</div><div class="sub">de las actividades calificadas</div></div>
      <div class="stat blue"><div class="lbl">Actividades</div><div class="val">${graded}/${totalActs}</div><div class="sub">calificadas</div></div>
      <div class="stat orange"><div class="lbl">Tareas entregadas</div><div class="val">${tareasHechas}/${tasks.length}</div></div>
      <div class="stat blue"><div class="lbl">Exámenes</div><div class="val">${examResults.length}</div><div class="sub">presentados</div></div>
    </div>
    ${examResults.length ? `
      <div class="panel">
        <h3>📝 Exámenes presentados</h3>
        <div class="grid-wrap"><table class="data">
          <thead><tr><th>Examen</th><th class="num">Aciertos</th><th class="num">Calif.</th><th class="num">Fecha</th></tr></thead>
          <tbody>${examResults.slice().sort((a,b)=>(b.date||'').localeCompare(a.date||'')).map(r=>{
            const e = state.exams.find(x=>x.id===r.examId);
            return `<tr><td>${esc(e?e.title:'Examen')}</td><td class="num">${r.score}/${r.total}</td><td class="num">${gradeChip(((r.score/r.total)*10).toFixed(1))}</td><td class="num" style="font-size:.78rem;color:var(--muted)">${fmtDate(r.date)}</td></tr>`;
          }).join('')}</tbody>
        </table></div>
      </div>
    ` : ''}
  `;
}
